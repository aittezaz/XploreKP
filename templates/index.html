<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XploreKP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #08141e;
        }

        .hero {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 15%, rgba(35, 161, 127, 0.38), transparent 30%),
                linear-gradient(rgba(8, 20, 30, 0.56), rgba(8, 20, 30, 0.74)),
                url("/static/images/bg.jpg") no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
        }

        .search-panel {
            width: min(92%, 460px);
            background: rgba(255, 255, 255, 0.13);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.3);
            padding: 36px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .badge-line {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            margin-bottom: 14px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(31, 138, 112, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #bff6e6;
            font-weight: 800;
            font-size: 0.9rem;
        }

        h1 {
            font-size: clamp(2.2rem, 7vw, 4.25rem);
            font-weight: 800;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 255, 255, 0.86);
            margin-bottom: 24px;
        }

        .form-control {
            min-height: 48px;
            border: 0;
            border-radius: 8px;
        }

        .search-form {
            position: relative;
        }

        .suggestions {
            display: none;
            position: absolute;
            z-index: 5;
            top: 54px;
            left: 0;
            right: 0;
            max-height: 210px;
            overflow-y: auto;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
            text-align: left;
        }

        .suggestion {
            width: 100%;
            min-height: 42px;
            border: 0;
            border-bottom: 1px solid rgba(8, 20, 30, 0.1);
            padding: 10px 12px;
            background: transparent;
            color: #08141e;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
        }

        .suggestion:hover,
        .suggestion:focus {
            background: rgba(31, 138, 112, 0.14);
            outline: 0;
        }

        .search-button {
            min-height: 48px;
            border: 0;
            border-radius: 8px;
            background: #1f8a70;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .search-button:hover {
            background: #176f5a;
            transform: translateY(-2px);
        }

        .hint {
            margin: 14px 0 0;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.92rem;
        }
    </style>
</head>

<body>
    <main class="hero">
        <section class="search-panel">
            <div class="badge-line">Khyber Pakhtunkhwa local guide</div>
            <h1>Explore KP</h1>
            <p>Search a city and discover useful places nearby.</p>

            <form class="search-form" action="/search">
                <input id="cityInput" type="text" name="city" class="form-control" placeholder="Enter city name" autocomplete="off">
                <div class="suggestions" id="citySuggestions" aria-label="City suggestions"></div>
                <button class="btn btn-success search-button mt-3 w-100">Search</button>
            </form>

            <p class="hint">Start typing to see city suggestions.</p>
        </section>
    </main>

    <script>
        const cityInput = document.querySelector("#cityInput");
        const citySuggestions = document.querySelector("#citySuggestions");
        const cities = [
            {% for slug, city in cities.items() %}
                { name: "{{ city.name }}", slug: "{{ slug }}" },
            {% endfor %}
        ];

        function hideSuggestions() {
            citySuggestions.innerHTML = "";
            citySuggestions.style.display = "none";
        }

        function showSuggestions() {
            const query = cityInput.value.trim().toLowerCase();
            hideSuggestions();

            if (!query) {
                return;
            }

            const matches = cities
                .filter((city) => city.name.toLowerCase().startsWith(query))
                .slice(0, 6);

            if (!matches.length) {
                return;
            }

            matches.forEach((city) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "suggestion";
                button.textContent = city.name;
                button.addEventListener("click", () => {
                    cityInput.value = city.name;
                    hideSuggestions();
                });
                citySuggestions.appendChild(button);
            });

            citySuggestions.style.display = "block";
        }

        cityInput.addEventListener("input", showSuggestions);
        cityInput.addEventListener("focus", () => {
            if (cityInput.value.trim()) {
                showSuggestions();
            }
        });
        document.addEventListener("click", (event) => {
            if (!event.target.closest(".search-form")) {
                hideSuggestions();
            }
        });
    </script>
</body>
</html>
