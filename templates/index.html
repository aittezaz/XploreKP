<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XploreKP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #08141e;
        }

        .hero {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 15%, rgba(35, 161, 127, 0.38), transparent 30%),
                linear-gradient(rgba(8, 20, 30, 0.56), rgba(8, 20, 30, 0.74)),
                url("/static/images/bg.jpg") no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
        }

        .search-panel {
            width: min(92%, 460px);
            background: rgba(255, 255, 255, 0.13);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.3);
            padding: 36px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .badge-line {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            margin-bottom: 14px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(31, 138, 112, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #bff6e6;
            font-weight: 800;
            font-size: 0.9rem;
        }

        h1 {
            font-size: clamp(2.2rem, 7vw, 4.25rem);
            font-weight: 800;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 255, 255, 0.86);
            margin-bottom: 24px;
        }

        .form-control {
            min-height: 48px;
            border: 0;
            border-radius: 8px;
        }

        .search-button {
            min-height: 48px;
            border: 0;
            border-radius: 8px;
            background: #1f8a70;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .search-button:hover {
            background: #176f5a;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <main class="hero">
        <section class="search-panel">
            <div class="badge-line">Khyber Pakhtunkhwa local guide</div>
            <h1>Explore KP</h1>
            <p>Search a city and discover useful places nearby.</p>

            <form action="/search">
                <input type="text" name="city" class="form-control" placeholder="Enter city name">
                <button class="btn btn-success search-button mt-3 w-100">Search</button>
            </form>
        </section>
    </main>
</body>
</html>
