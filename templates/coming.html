<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - XploreKP</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: white;
            background:
                linear-gradient(rgba(7, 18, 27, 0.62), rgba(7, 18, 27, 0.82)),
                url("/static/images/bg.jpg") no-repeat center center/cover;
            padding: 24px;
        }

        .message {
            width: min(92%, 520px);
            padding: 36px;
            text-align: center;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 7vw, 3.8rem);
        }

        p {
            color: rgba(255, 255, 255, 0.84);
            line-height: 1.6;
            margin-bottom: 26px;
        }

        a {
            display: inline-block;
            color: white;
            background: #1f8a70;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        a:hover {
            background: #176f5a;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <main class="message">
        <h1>{{ city|title }}</h1>
        <p>We are working on this city and will add places here soon.</p>

        <a href="/">Go Back</a>
    </main>
</body>
</html>
