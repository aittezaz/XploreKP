<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ city.name }} - XploreKP</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --accent: #23a17f;
            --accent-dark: #15745e;
            --glass: rgba(255, 255, 255, 0.14);
            --glass-border: rgba(255, 255, 255, 0.22);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            background:
                radial-gradient(circle at top left, rgba(35, 161, 127, 0.34), transparent 34%),
                linear-gradient(rgba(5, 14, 21, 0.64), rgba(5, 14, 21, 0.84)),
                url("/static/images/bg.jpg") no-repeat center center/cover;
        }

        .page {
            width: min(1120px, 92%);
            margin: 0 auto;
            padding: 54px 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-bottom: 42px;
        }

        .brand {
            color: white;
            font-size: 1.05rem;
            font-weight: 800;
            text-decoration: none;
        }

        .nav-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        .back-link,
        .add-link {
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.32);
            border-radius: 8px;
            padding: 10px 16px;
            text-decoration: none;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .add-link {
            background: var(--accent);
            border-color: transparent;
            font-weight: 800;
        }

        .back-link:hover,
        .add-link:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-2px);
        }

        .add-link:hover {
            background: var(--accent-dark);
        }

        .intro {
            max-width: 820px;
            margin-bottom: 34px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            margin-bottom: 16px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(35, 161, 127, 0.18);
            border: 1px solid rgba(140, 227, 199, 0.28);
            color: #bff6e6;
            font-weight: 800;
            letter-spacing: 0;
        }

        h1 {
            font-size: clamp(2.2rem, 7vw, 5rem);
            line-height: 1;
            margin: 0 0 14px;
        }

        .intro p {
            color: rgba(255, 255, 255, 0.82);
            font-size: 1.08rem;
            line-height: 1.7;
            margin: 0;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
        }

        .category-card {
            min-height: 112px;
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 14px;
            color: white;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-decoration: none;
            backdrop-filter: blur(12px);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .category-card:hover {
            background: rgba(35, 161, 127, 0.84);
            border-color: rgba(255, 255, 255, 0.44);
            transform: translateY(-5px);
        }

        .category-name {
            font-size: 1.18rem;
            font-weight: 800;
        }

        .category-count {
            display: block;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.76);
            font-size: 0.92rem;
            font-weight: 700;
        }

        .category-arrow {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            font-size: 1.3rem;
        }

        @media (max-width: 640px) {
            .topbar {
                align-items: stretch;
                flex-direction: column;
            }

            .nav-actions {
                justify-content: stretch;
            }

            .back-link,
            .add-link {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <nav class="topbar">
            <a class="brand" href="/">XploreKP</a>
            <div class="nav-actions">
                <a class="add-link" href="/{{ city_slug }}/add">Add Place</a>
                <a class="back-link" href="/">Back to Search</a>
            </div>
        </nav>

        <section class="intro">
            <div class="eyebrow">XploreKP City Guide</div>
            <h1>{{ city.name }}</h1>
            <p>{{ city.tagline }} Choose a category, compare saved places, or add your own place with its exact map location.</p>
        </section>

        <section class="category-grid" aria-label="{{ city.name }} categories">
            {% for category in categories %}
                <a class="category-card" href="/{{ city_slug }}/{{ category.slug }}">
                    <span>
                        <span class="category-name">{{ category.name }}</span>
                        <span class="category-count">{{ category.count }} places</span>
                    </span>
                    <span class="category-arrow" aria-hidden="true">&gt;</span>
                </a>
            {% endfor %}
        </section>
    </main>
</body>
</html>
